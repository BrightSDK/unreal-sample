name: Package & Release Plugin

on:
  push:
    tags:
      - 'v*.*.*'

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Extract version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Download SDK binaries
        run: |
          chmod +x install_bright_sdk.sh
          # Pin exact versions derived from the tag, or use latest
          ./install_bright_sdk.sh
          echo "ThirdParty contents:"
          find BrightSDK/ThirdParty -type f | sed 's|^|  |'

      - name: Stage plugin files
        run: |
          PLUGIN_DIR="dist/BrightSDK"
          mkdir -p "$PLUGIN_DIR"

          # Core plugin files
          cp -r BrightSDK/BrightSDK.uplugin  "$PLUGIN_DIR/"
          cp -r BrightSDK/Resources           "$PLUGIN_DIR/"
          cp -r BrightSDK/Source              "$PLUGIN_DIR/"
          cp -r BrightSDK/ThirdParty          "$PLUGIN_DIR/"

      - name: Stamp version into .uplugin
        run: |
          VERSION="${{ steps.version.outputs.VERSION }}"
          UPLUGIN="dist/BrightSDK/BrightSDK.uplugin"
          # Replace VersionName field in-place
          sed -i "s/\"VersionName\": \".*\"/\"VersionName\": \"${VERSION}\"/" "$UPLUGIN"

      - name: Create zip
        run: |
          VERSION="${{ steps.version.outputs.VERSION }}"
          cd dist
          zip -r "../BrightSDK-UE-Plugin-v${VERSION}.zip" BrightSDK README.md 2>/dev/null || \
          zip -r "../BrightSDK-UE-Plugin-v${VERSION}.zip" BrightSDK

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: "BrightSDK UE Plugin v${{ steps.version.outputs.VERSION }}"
          body: |
            ## Installation

            1. Download `BrightSDK-UE-Plugin-v${{ steps.version.outputs.VERSION }}.zip`
            2. Extract to `<YourProject>/Plugins/`
            3. Re-generate project files and build

            See [README.md](README.md) for full usage instructions.
          files: "BrightSDK-UE-Plugin-v${{ steps.version.outputs.VERSION }}.zip"
          draft: false
          prerelease: ${{ contains(github.ref_name, '-') }}
